# Minimal Supabase CLI config for local development (`supabase start`).
# Run `supabase init` to regenerate a full config for your CLI version.

project_id = "web-app-template"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/**"]
jwt_expiry = 3600
# ArcBase has no self-serve signup — staff accounts are provisioned by an
# Engineer/Admin in Supabase (ADR 0007, SRS §1).
enable_signup = false

[auth.email]
enable_signup = false
enable_confirmations = false
