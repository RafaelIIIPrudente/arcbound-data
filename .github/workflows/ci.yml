name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

env:
  NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Version comes from package.json's "packageManager" field — do not also
      # pass a `version:` input here, or pnpm/action-setup errors on the mismatch.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm type:check

      - run: pnpm test:coverage

      - run: pnpm exec playwright install --with-deps chromium

      - run: pnpm test:e2e

      - run: pnpm build

  # Dependency review runs only on pull requests (it diffs the base vs head
  # dependency manifests) and fails the PR on high-severity vulnerable deps.
  dependency-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
